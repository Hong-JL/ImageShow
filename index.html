<!DOCTYPE html>
<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优秀作品展播</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>:root {
    --primary-color: #2962ff; /* 亮蓝色 */
    --secondary-color: #651fff; /* 亮紫色 */
    --bg-color: #0b1120;      /* 深空蓝背景 */
    --text-color: #f5f5f5;
    --card-bg: rgba(255, 255, 255, 0.03); /* 极低透明度用于毛玻璃 */
    --glass-border: rgba(255, 255, 255, 0.08);
    --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    --neon-glow: 0 0 40px rgba(41, 98, 255, 0.3);
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    background-image: 
        radial-gradient(circle at 15% 50%, rgba(41, 98, 255, 0.1) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(101, 31, 255, 0.1) 0%, transparent 25%);
    min-height: 100vh;
    overflow-x: hidden;
}

/* 头部 */
.gallery-header {
    text-align: center;
    padding: 30px 20px 10px;
    position: relative;
    z-index: 10;
}

.header-content h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 0 0 10px 0;
    text-shadow: 0 2px 10px rgba(255,255,255,0.2);
}

.subtitle {
    color: #8a9bb5;
    font-size: 15px;
    letter-spacing: 1px;
    margin-bottom: 20px;
}

/* 控制栏与按钮 */
.controls-bar {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 15px;
}

.btn-primary, .btn-secondary {
    background: var(--primary-color);
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(41, 98, 255, 0.3);
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--glass-border);
    box-shadow: none;
}

.btn-primary:hover {
    background: #1c44b2;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(41, 98, 255, 0.4);
}

.btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
}

.loading-status {
    margin-top: 15px;
    color: #8a9bb5;
    font-size: 14px;
}

/* 筛选栏 */
.filter-bar {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

.class-select {
    background: rgba(11, 17, 32, 0.8);
    border: 1px solid var(--glass-border);
    color: #fff;
    padding: 10px 24px;
    font-size: 15px;
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.class-select:hover, .class-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 15px rgba(41, 98, 255, 0.2);
}

.class-select option {
    background: var(--bg-color);
    color: #fff;
}

/* 主容器布局 - 左右分栏 */
.page-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    position: relative;
}

/* 左侧说明文本区 */
.intro-side {
    flex: 1;
    max-width: 400px;
    display: none; /* 默认隐藏，大屏显示 */
}

@media (min-width: 992px) {
    .intro-side {
        display: block;
        animation: fadeInRight 0.8s ease-out;
    }
}

.security-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(41, 98, 255, 0.1);
    border: 1px solid rgba(41, 98, 255, 0.2);
    color: var(--primary-color);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 24px;
}

.intro-side h2 {
    font-size: 48px;
    line-height: 1.1;
    margin: 0 0 20px 0;
    font-weight: 800;
}

.highlight-blue {
    color: var(--primary-color);
}

.intro-desc {
    color: #8a9bb5;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 30px;
}

.features-list {
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: #a0aec0;
}

.features-list span {
    display: flex;
    align-items: center;
    gap: 6px;
}

.check-icon {
    color: #10b981;
    font-style: normal;
}

/* 右侧轮播容器 - 毛玻璃拟物化设备风格 */
.carousel-container {
    flex: 1;
    max-width: 500px;
    width: 100%;
    background: var(--card-bg);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow), var(--neon-glow);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    animation: fadeInUp 0.8s ease-out;
}

/* 类似 App 的内部头部 */
.app-header {
    padding: 24px 24px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.app-greeting {
    display: flex;
    flex-direction: column;
}

.greeting-text {
    color: #8a9bb5;
    font-size: 13px;
    margin-bottom: 4px;
}

.greeting-name {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
}

.app-stats {
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    border: 1px solid rgba(255,255,255,0.05);
}

.stats-trend {
    color: #10b981;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
}

.stats-label {
    color: #8a9bb5;
    font-size: 11px;
}

/* 核心轮播区 */
.slides-wrapper {
    position: relative;
    width: 100%;
    flex-grow: 1;
    min-height: 400px;
}

.gs-slide-item {
    display: none;
    width: 100%;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
}

.gs-slide-item.active {
    display: flex;
    animation: gsFadeIn 0.6s ease-in-out;
}

@keyframes gsFadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInRight {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

.gs-work-image {
    max-width: 85%;
    max-height: 50vh;
    object-fit: contain;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    margin: 10px 0;
    transition: transform 0.3s ease;
}

.gs-work-image:hover {
    transform: scale(1.02);
}

.gs-work-info {
    width: 100%;
    padding: 15px 20px 0;
    text-align: center;
}

.gs-student-name {
    font-size: 18px;
    color: #fff;
    margin: 0;
    font-weight: 600;
    background: linear-gradient(90deg, #fff, #a0aec0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 底部交互区 */
.app-footer {
    padding: 15px 24px 24px;
    background: linear-gradient(to top, rgba(11, 17, 32, 0.8), transparent);
}

.carousel-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 8px;
}

.carousel-btn {
    background: rgba(255,255,255,0.05);
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
}

.carousel-btn:hover {
    background: var(--primary-color);
    transform: scale(1.05);
}

/* 进度指示器 */
.indicators-container {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 60%;
}

.gs-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s ease;
}

.gs-dot.active {
    background: var(--primary-color);
    width: 16px;
    border-radius: 4px;
    box-shadow: 0 0 8px var(--primary-color);
}

/* 移动端适配 */
@media (max-width: 768px) {
    .page-container {
        padding: 20px 10px;
    }
    .carousel-container {
        border-radius: 16px;
    }
    .gs-work-image {
        max-width: 90%;
    }
    .app-header {
        padding: 16px 16px 5px;
    }
    .app-footer {
        padding: 10px 16px 16px;
    }
}</style>
</head>
<body>

","imgUrl":"http://10.1.226.227/homework/2023/3/4/3036/5047/2023360188_3036_5047_52.png","base64Img":"images_compressed/img_12_304_黄芷玥.jpg"},{"className":"305","authorName":"余锦航","imgUrl":"http://10.1.226.227/homework/2023/3/5/4033/5049/2023360213_4033_5049_3.png","base64Img":"images_compressed/img_13_305_余锦航.jpg"},{"className":"305","authorName":"莫桔阀","imgUrl":"http://10.1.226.227/homework/2023/3/5/4033/5049/2023360217_4033_5049_71.png","base64Img":"images_compressed/img_14_305_莫桔阀.jpg"},{"className":"305","authorName":"曹景琪","imgUrl":"http://10.1.226.227/homework/2023/3/5/4033/5049/2023360235_4033_5049_92.png","base64Img":"images_compressed/img_15_305_曹景琪.jpg"},{"className":"306","authorName":"吕霁旸","imgUrl":"http://10.1.226.227/homework/2023/3/6/4033/5049/2023360274_4033_5049_58.png","base64Img":"images_compressed/img_16_306_吕霁旸.jpg"},{"className":"306","authorName":"张舒雅","imgUrl":"http://10.1.226.227/homework/2023/3/6/4033/5049/2023360281_4033_5049_54.png","base64Img":"images_compressed/img_17_306_张舒雅.jpg"},{"className":"306","authorName":"杨梓熙","imgUrl":"http://10.1.226.227/homework/2023/3/6/4033/5049/2023360283_4033_5049_56.png","base64Img":"images_compressed/img_18_306_杨梓熙.jpg"},{"className":"307","authorName":"温南北","imgUrl":"http://10.1.226.227/homework/2023/3/7/4033/5049/2023360314_4033_5049_31.png","base64Img":"images_compressed/img_19_307_温南北.jpg"},{"className":"307","authorName":"袁浩轩","imgUrl":"http://10.1.226.227/homework/2023/3/7/4033/5049/2023360322_4033_5049_29.png","base64Img":"images_compressed/img_20_307_袁浩轩.jpg"},{"className":"307","authorName":"李承霖","imgUrl":"http://10.1.226.227/homework/2023/3/7/4033/5049/2023360330_4033_5049.png","base64Img":"images_compressed/img_21_307_李承霖.jpg"},{"className":"308","authorName":"刘北宸","imgUrl":"http://10.1.226.227/homework/2023/3/8/4033/5049/2023360358_4033_5049_48.png","base64Img":"images_compressed/img_22_308_刘北宸.jpg"},{"className":"308","authorName":"颜诗黛","imgUrl":"http://10.1.226.227/homework/2023/3/8/4033/5049/2023360378_4033_5049_48.png","base64Img":"images_compressed/img_23_308_颜诗黛.jpg"},{"className":"308","authorName":"姚阅","imgUrl":"http://10.1.226.227/homework/2023/3/8/4033/5049/2023360390_4033_5049_44.png","base64Img":"images_compressed/img_24_308_姚阅.jpg"},{"className":"309","authorName":"李栎","imgUrl":"http://10.1.226.227/homework/2023/3/9/4033/5049/2023360397_4033_5049_6.png","base64Img":"images_compressed/img_25_309_李栎.jpg"},{"className":"309","authorName":"田彧汀","imgUrl":"http://10.1.226.227/homework/2023/3/9/4033/5049/2023360420_4033_5049_76.png","base64Img":"images_compressed/img_26_309_田彧汀.jpg"},{"className":"309","authorName":"刘夏彤","imgUrl":"http://10.1.226.227/homework/2023/3/9/4033/5049/2023360422_4033_5049_69.png","base64Img":"images_compressed/img_27_309_刘夏彤.jpg"},{"className":"310","authorName":"彭涵琪","imgUrl":"http://10.1.226.227/homework/2023/3/10/4033/5049/2023360445_4033_5049_67.png","base64Img":"images_compressed/img_28_310_彭涵琪.jpg"},{"className":"310","authorName":"聂怡然","imgUrl":"http://10.1.226.227/homework/2023/3/10/4033/5049/2023360457_4033_5049.png","base64Img":"images_compressed/img_29_310_聂怡然.jpg"},{"className":"310","authorName":"郭应潼","imgUrl":"http://10.1.226.227/homework/2023/3/10/4033/5049/2023360494_4033_5049.png","base64Img":"images_compressed/img_30_310_郭应潼.jpg"}];
                let currentSlideIndex = 0;
                let carouselInterval = null;
                let activeWorksCount = 0;

                function renderCarousel(worksToRender) {
                    const slidesWrapper = document.getElementById('gs-slides-wrapper');
                    const indicatorsContainer = document.getElementById('gs-indicators');
                    
                    slidesWrapper.innerHTML = '';
                    indicatorsContainer.innerHTML = '';
                    activeWorksCount = worksToRender.length;
                    
                    if (activeWorksCount === 0) {
                        slidesWrapper.innerHTML = '<div style="color:white;text-align:center;padding-top:100px;">该班级暂无优秀作品展示</div>';
                        stopCarousel();
                        return;
                    }
                    
                    worksToRender.forEach((work, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'gs-slide-item' + (index === 0 ? ' active' : '');
                        
                        slide.innerHTML = '<img class="gs-work-image" src="' + work.base64Img + '" alt="' + work.authorName + '的作品">' +
                            '<div class="gs-work-info">' +
                                '<h3 class="gs-student-name">' + work.className + '班 - ' + work.authorName + '</h3>' +
                            '</div>';
                        slidesWrapper.appendChild(slide);
                        
                        const dot = document.createElement('div');
                        dot.className = 'gs-dot' + (index === 0 ? ' active' : '');
                        dot.addEventListener('click', () => goToSlide(index));
                        indicatorsContainer.appendChild(dot);
                    });
                    
                    currentSlideIndex = 0;
                    startCarousel();
                }

                function startCarousel() {
                    stopCarousel();
                    if(activeWorksCount <= 1) return;
                    carouselInterval = setInterval(() => changeSlide(1), 5000);
                }

                function stopCarousel() {
                    if (carouselInterval) clearInterval(carouselInterval);
                }

                function changeSlide(direction) {
                    if(activeWorksCount <= 1) return;
                    let newIndex = currentSlideIndex + direction;
                    if (newIndex >= activeWorksCount) newIndex = 0;
                    if (newIndex < 0) newIndex = activeWorksCount - 1;
                    goToSlide(newIndex);
                }

                function goToSlide(index) {
                    if (activeWorksCount === 0) return;
                    const slides = document.querySelectorAll('.gs-slide-item');
                    const dots = document.querySelectorAll('.gs-dot');
                    
                    if(slides[currentSlideIndex]) slides[currentSlideIndex].classList.remove('active');
                    if(dots[currentSlideIndex]) dots[currentSlideIndex].classList.remove('active');
                    
                    currentSlideIndex = index;
                    
                    if(slides[currentSlideIndex]) slides[currentSlideIndex].classList.add('active');
                    if(dots[currentSlideIndex]) dots[currentSlideIndex].classList.add('active');
                    
                    startCarousel();
                }

                document.getElementById('gs-prev-btn').addEventListener('click', () => changeSlide(-1));
                document.getElementById('gs-next-btn').addEventListener('click', () => changeSlide(1));

                const classFilter = document.getElementById('gs-class-filter');
                if (classFilter) {
                    classFilter.addEventListener('change', (e) => {
                        const val = e.target.value;
                        if (val === 'all') {
                            renderCarousel(allWorks);
                        } else {
                            const filtered = allWorks.filter(w => w.className === val);
                            renderCarousel(filtered);
                        }
                    });
                }
